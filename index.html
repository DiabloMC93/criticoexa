<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCI & Emergencias - Dark Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-light: rgba(59, 130, 246, 0.1);
            --success: #10b981;
            --error: #f43f5e;
            --bg: #0f172a;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --card-bg: #1e293b;
            --border: #334155;
            --opt-hover: #2d3a4f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.5;
        }

        /* Header Estilizado */
        header {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-icon {
            background: var(--primary);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .header-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
        }

        .stats-row {
            display: flex;
            gap: 8px;
        }

        .stat-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.5);
        }

        .badge-q   { color: var(--primary); }
        .badge-ok  { color: var(--success); }
        .badge-err { color: var(--error); }

        /* Barra de Progreso */
        .progress-container {
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--border);
            z-index: 99;
        }
        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px var(--primary);
        }

        main {
            max-width: 720px;
            margin: 40px auto;
            padding: 0 20px 80px;
            width: 100%;
        }

        /* Tarjeta de Pregunta */
        .q-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .q-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .q-badge {
            background: var(--bg);
            color: var(--text-muted);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: 1px solid var(--border);
        }

        .q-text {
            font-size: 19px;
            font-weight: 600;
            line-height: 1.6;
            color: var(--text-main);
            margin-bottom: 32px;
        }

        /* Opciones */
        .options { display: flex; flex-direction: column; gap: 12px; }

        .opt {
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(15, 23, 42, 0.3);
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 18px 20px;
            cursor: pointer;
            width: 100%;
            text-align: left;
            transition: all 0.2s ease;
            color: var(--text-main);
        }

        .opt:hover:not(:disabled) {
            border-color: var(--primary);
            background: var(--opt-hover);
            transform: translateX(6px);
        }

        .opt-letter {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: var(--border);
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .opt-text {
            font-size: 15px;
            font-weight: 500;
        }

        /* Estados de respuesta */
        .opt.correct { border-color: var(--success); background: rgba(16, 185, 129, 0.1); }
        .opt.correct .opt-letter { background: var(--success); color: white; }
        
        .opt.wrong { border-color: var(--error); background: rgba(244, 63, 94, 0.1); }
        .opt.wrong .opt-letter { background: var(--error); color: white; }

        .opt.show-correct { border-color: var(--success); border-style: dashed; }

        /* Feedback */
        .feedback {
            margin-top: 24px;
            padding: 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            display: none;
            text-align: center;
            border: 1px solid transparent;
        }
        .feedback.show { display: block; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .feedback.ok  { background: rgba(16, 185, 129, 0.15); color: #34d399; border-color: rgba(16, 185, 129, 0.3); }
        .feedback.err { background: rgba(244, 63, 94, 0.15); color: #fb7185; border-color: rgba(244, 63, 94, 0.3); }

        .btn-row { 
            display: flex; 
            justify-content: center; 
            margin-top: 32px; 
        }

        .btn-next {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px 40px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: none;
            transition: all 0.2s;
            box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.4);
        }
        .btn-next.show { display: block; }
        .btn-next:hover { background: #2563eb; transform: translateY(-2px); }

        /* Pantalla de Resultados */
        #results { display: none; }
        #results.show { display: block; }

        .results-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 60px 40px;
            text-align: center;
        }

        .res-score {
            font-size: 84px;
            font-weight: 800;
            margin: 20px 0;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .res-msg {
            font-size: 18px;
            color: var(--text-muted);
            margin-bottom: 40px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .res-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 40px;
        }
        .res-box {
            background: var(--bg);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }
        .res-box .rv { font-size: 28px; font-weight: 800; display: block; }
        .res-box .rl { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }

        .btn-restart {
            background: var(--text-main);
            color: var(--bg);
            border: none;
            border-radius: 12px;
            padding: 16px 48px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        #quiz.hidden { display: none; }

        @media (max-width: 600px) {
            main { padding: 10px; margin-top: 20px; }
            .q-card { padding: 24px; border-radius: 20px; }
            .res-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-brand">
        <div class="brand-icon">+</div>
        <span class="header-title">UCI &amp; Emergencias</span>
    </div>
    <div class="stats-row">
        <div class="stat-badge badge-q"><span id="c-q">0</span>/25</div>
        <div class="stat-badge badge-ok">✓ <span id="c-ok">0</span></div>
        <div class="stat-badge badge-err">✕ <span id="c-err">0</span></div>
    </div>
</header>

<div class="progress-container">
    <div class="progress-fill" id="prog"></div>
</div>

<main>
    <div id="quiz">
        <div class="q-card" id="qcard">
            <div class="q-meta">
                <span class="q-badge" id="q-num">Pregunta 1</span>
                <span class="q-badge" id="q-frac">1 / 25</span>
            </div>
            <p class="q-text" id="q-text"></p>
            <div class="options" id="opts"></div>
            <div class="feedback" id="feedback"></div>
            <div class="btn-row">
                <button class="btn-next" id="btn-next">Siguiente</button>
            </div>
        </div>
    </div>

    <div id="results">
        <div class="results-card">
            <span class="q-badge">Resultados Finales</span>
            <div class="res-score" id="r-pct">0%</div>
            <p class="res-msg" id="r-msg"></p>
            
            <div class="res-grid">
                <div class="res-box">
                    <span class="rv" id="r-total">25</span>
                    <span class="rl">Total</span>
                </div>
                <div class="res-box" style="color: var(--success)">
                    <span class="rv" id="r-ok">0</span>
                    <span class="rl">Aciertos</span>
                </div>
                <div class="res-box" style="color: var(--error)">
                    <span class="rv" id="r-err">0</span>
                    <span class="rl">Errores</span>
                </div>
            </div>
            <button class="btn-restart" onclick="restart()">Reiniciar Test</button>
        </div>
    </div>
</main>

<script>
const QS=[
  {q:"¿Cuál de las siguientes medidas debe ser prioritaria ante un paciente en situación de edema agudo de pulmón?",o:["Cloruro mórfico","Sedestación","Diuréticos","Oxigenoterapia"],a:3},
  {q:"Paciente en MI con CVC en subclavia (5 días): dolor torácico agudo en cuello que empeora con la tos, disnea, taquipnea y palpitaciones. ¿Qué patología podría ser?",o:["Insuficiencia renal","Taponamiento cardíaco","EPOC","Síncope"],a:1},
  {q:"¿A qué valores de tensión arterial se considera crisis hipertensiva?",o:["> 130 mmHg de PAD","> 130 mmHg de PAS","130 mmHg de PAS","130 mmHg de PAD"],a:0},
  {q:"¿Qué manifestaciones clínicas puede acompañar a una crisis hipertensiva?",o:["Alteración del nivel de conciencia","Shock hipovolémico","Hematuria","Todas son correctas"],a:0},
  {q:"Paciente con TCE: localiza el dolor, palabras inapropiadas y abre los ojos al dolor. ¿Qué GCS tiene?",o:["10","12","14","15"],a:0},
  {q:"Ante sospecha de EAP, ¿qué debemos hacer para orientar el tratamiento de rescate?",o:["Tomar TA","SatO₂ para la administración correcta de O₂","Sondaje vesical y balance hídrico","Todas son correctas"],a:3},
  {q:"Paciente con sospecha de EAP: SatO₂ 94 %, TAS 80 mmHg, glucemia 150 mg/dl. ¿Qué tratamiento está indicado?",o:["Dobutamina 5 mcg/kg/min","Dobutamina 10 mcg/kg/min","Captopril 25 mg","Cloruro mórfico"],a:0},
  {q:"La diferenciación entre HDA y HDB se basa en:",o:["Forma de presentación","Según la hemorragia se extiende a estómago o ano","Según se origine por encima o debajo del ángulo de Treitz","Todas son correctas"],a:2},
  {q:"La posición de cabecero a 60° para mejorar la expansión pulmonar y disminuir la precarga es útil en:",o:["TEP","EAP","TC","Todas son correctas"],a:1},
  {q:"¿Dónde se origina la mayor parte del TEP?",o:["Directamente en la aurícula derecha","Venas pélvicas","Sistema venoso profundo de MMII","In situ en territorio pulmonar"],a:2},
  {q:"Para la sedación del paciente con TCE en UCI, ¿qué se debe usar prioritariamente?",o:["Diazepam","Barbitúricos","Midazolam","Todos son correctos"],a:2},
  {q:"¿Qué patología está relacionada con la emergencia hipertensiva?",o:["Insuficiencia renal aguda","Cetoacidosis metabólica","TCE","Ninguna"],a:0},
  {q:"¿Qué patología presenta un paciente con hipoperfusión tisular por fallo en la bomba cardíaca?",o:["Shock cardiogénico","Shock distributivo","Shock obstructivo","Shock hipovolémico"],a:0},
  {q:"¿Qué derivación se encuentra entre aVL y aVF?",o:["I","II","III","IV"],a:2},
  {q:"El electrodo de V4 se localiza en:",o:["Línea medioclavicular, 5.º espacio intercostal izquierdo","Línea paraesternal, espacio intercostal izquierdo","Línea axilar media, espacio intercostal izquierdo","Línea medioclavicular, espacio intercostal derecho"],a:0},
  {q:"En un TCE con TAM de 80 mmHg, ¿qué tratamiento estaría indicado?",o:["Dopamina 0,5 mcg","Dopamina 7 mcg","Dobutamina 7 mcg","Todas son correctas"],a:1},
  {q:"Para aumentar la diuresis con una droga vasoactiva, ¿qué puede administrar?",o:["Dopamina hasta 0,5 microgotas","Dopamina entre 0,5–10 microgotas","Furosemida","Dobutamina"],a:1},
  {q:"Ante cetoacidosis diabética, ¿qué clínica nos podemos encontrar?",o:["Acidosis metabólica con HCO₃ < 20 mEq","Acidosis metabólica con HCO₃ > 30 mEq","Acidosis respiratoria con CO₂ > 45","Alcalosis metabólica con HCO₃ < 20 mEq"],a:0},
  {q:"Paciente en UCI con taponamiento cardíaco y acidosis metabólica. ¿Qué modificación compensatoria aparecería?",o:["Aumenta la diuresis","Hiperventilación","Disminuye el GC","Todas son correctas"],a:1},
  {q:"¿Cuál es la medida básica para tratar el taponamiento cardíaco?",o:["Toracotomía","Oxigenoterapia","Pericardiocentesis","Paracentesis"],a:2},
  {q:"En la fisiopatología de la cetoacidosis diabética, ¿cuál es la afirmación correcta?",o:["El glicerol es el principal sustrato de la cetogénesis oxidativa","Existe disminución de la filtración glomerular","La lipólisis de triglicéridos produce ácidos grasos libres","Todas las afirmaciones son incorrectas"],a:2},
  {q:"¿Qué complicación puede aparecer en una emergencia por cetoacidosis diabética?",o:["Hiperventilación","EAP","Shock cardiogénico","Todas son correctas"],a:0},
  {q:"Fármaco de 1.ª elección en el shock cardiogénico:",o:["Noradrenalina — disminuye el GC, puede causar vasodilatación periférica","Diuréticos — controlan la PVC, pueden causar vasodilatación local","Dobutamina — incrementa el GC, puede causar vasodilatación periférica","Dobutamina — incrementa el GC, puede causar vasodilatación central"],a:2},
  {q:"Manifestaciones propias del shock cardiogénico:",o:["PA alta, PVC baja","PA alta, PVC alta","PA baja, PVC baja","PA baja, PVC alta"],a:3},
  {q:"En el ECG, aVF negativo y derivación I positiva podría significar:",o:["Insuficiencia cardíaca derecha","Eje izquierdo (hemibloqueo anterior izquierdo)","Hipertrofia ventricular derecha","Eje normal"],a:1}
];

const L=['A','B','C','D'];
let cur=0,ok=0,err=0,done=false;

function render(){
    done=false;
    const q=QS[cur];
    document.getElementById('q-num').textContent='Pregunta '+(cur+1);
    document.getElementById('q-frac').textContent=(cur+1)+' / '+QS.length;
    document.getElementById('q-text').textContent=q.q;
    const c=document.getElementById('opts');
    c.innerHTML='';
    q.o.forEach((t,i)=>{
        const b=document.createElement('button');
        b.className='opt';
        b.innerHTML=`<span class="opt-letter">${L[i]}</span><span class="opt-text">${t}</span>`;
        b.onclick=()=>pick(i);
        c.appendChild(b);
    });
    const fb=document.getElementById('feedback');
    fb.className='feedback';fb.textContent='';
    const bn=document.getElementById('btn-next');
    bn.className='btn-next';
    bn.textContent=cur===QS.length-1?'Ver Resultados':'Continuar';
    sync();
}

function pick(i){
    if(done)return;
    done=true;
    const q=QS[cur];
    const opts = document.querySelectorAll('.opt');
    opts.forEach(b=>b.disabled=true);
    const fb=document.getElementById('feedback');
    
    if(i===q.a){
        opts[i].classList.add('correct');
        fb.className='feedback ok show';
        fb.textContent='¡Correcto!';
        ok++;
    } else {
        opts[i].classList.add('wrong');
        opts[q.a].classList.add('show-correct');
        fb.className='feedback err show';
        fb.textContent='Incorrecto. La respuesta correcta era la '+L[q.a];
        err++;
    }
    document.getElementById('btn-next').className='btn-next show';
    sync();
}

function sync(){
    document.getElementById('c-q').textContent=cur;
    document.getElementById('c-ok').textContent=ok;
    document.getElementById('c-err').textContent=err;
    document.getElementById('prog').style.width=(cur/QS.length*100)+'%';
}

function next(){
    cur++;
    if(cur>=QS.length){finish();return;}
    render();
}

function finish(){
    document.getElementById('quiz').classList.add('hidden');
    const rs=document.getElementById('results');
    rs.classList.add('show');
    const pct=Math.round(ok/QS.length*100);
    const el=document.getElementById('r-pct');
    el.textContent=pct+'%';
    
    if(pct>=80) el.style.color='var(--success)';
    else if(pct>=60) el.style.color='#f59e0b';
    else el.style.color='var(--error)';

    document.getElementById('r-ok').textContent=ok;
    document.getElementById('r-err').textContent=err;
    document.getElementById('r-total').textContent=QS.length;
    document.getElementById('r-msg').textContent=
        pct>=80?'Dominio experto en UCI y emergencias.':'Sigue practicando para mejorar tus protocolos.';
    
    document.getElementById('c-q').textContent=QS.length;
    document.getElementById('prog').style.width='100%';
}

function restart(){
    cur=0;ok=0;err=0;done=false;
    document.getElementById('results').classList.remove('show');
    document.getElementById('quiz').classList.remove('hidden');
    render();
}

document.getElementById('btn-next').onclick=next;
render();
</script>
</body>
</html>
