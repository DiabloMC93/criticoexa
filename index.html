<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test UCI & Emergencias</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --bg2: #141720;
    --bg3: #1c2030;
    --border: #2a2f3e;
    --border2: #3a4056;
    --text: #e8eaf0;
    --text2: #8b90a8;
    --text3: #5a5f78;
    --accent: #4f8ef7;
    --accent2: #2563c8;
    --success: #22c55e;
    --success-bg: #0f2b1a;
    --danger: #f4605a;
    --danger-bg: #2b0f0f;
    --warning: #f59e0b;
    --radius: 10px;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-size: 13px;
    font-family: var(--mono);
    color: var(--text3);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .logo span { color: var(--accent); }

  .counters {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .counter-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 5px 14px;
    font-family: var(--mono);
    font-size: 12px;
  }
  .counter-pill .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
  }
  .counter-pill .val { font-size: 14px; font-weight: 600; }
  .pill-total .dot { background: var(--accent); }
  .pill-total .val { color: var(--accent); }
  .pill-ok .dot { background: var(--success); }
  .pill-ok .val { color: var(--success); }
  .pill-err .dot { background: var(--danger); }
  .pill-err .val { color: var(--danger); }

  main { max-width: 760px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

  .progress-bar-wrap {
    background: var(--bg3);
    border-radius: 999px;
    height: 4px;
    margin-bottom: 2.5rem;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 999px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .question-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 2rem;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .q-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 10px;
    white-space: nowrap;
    margin-top: 2px;
    flex-shrink: 0;
  }
  .q-text {
    font-size: 16px;
    line-height: 1.6;
    color: var(--text);
  }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    text-align: left;
    width: 100%;
  }
  .option:hover:not(:disabled) {
    border-color: var(--border2);
    background: #222639;
  }
  .opt-letter {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    color: var(--text3);
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 8px;
    flex-shrink: 0;
    margin-top: 1px;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .opt-text {
    font-size: 14px;
    line-height: 1.5;
    color: var(--text2);
    transition: color 0.15s;
  }

  .option.correct {
    border-color: var(--success);
    background: var(--success-bg);
  }
  .option.correct .opt-letter {
    background: var(--success);
    color: #0d0f14;
    border-color: var(--success);
  }
  .option.correct .opt-text { color: var(--success); }

  .option.wrong {
    border-color: var(--danger);
    background: var(--danger-bg);
  }
  .option.wrong .opt-letter {
    background: var(--danger);
    color: #0d0f14;
    border-color: var(--danger);
  }
  .option.wrong .opt-text { color: var(--danger); }

  .option.revealed {
    border-color: var(--success);
    background: var(--success-bg);
    opacity: 0.6;
  }
  .option.revealed .opt-letter {
    background: var(--success);
    color: #0d0f14;
    border-color: var(--success);
  }
  .option.revealed .opt-text { color: var(--success); }

  .option:disabled { cursor: default; }

  .feedback-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-top: 14px;
    font-size: 13px;
    font-family: var(--mono);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .feedback-bar.show { opacity: 1; }
  .feedback-bar.ok { background: var(--success-bg); border: 1px solid var(--success); color: var(--success); }
  .feedback-bar.fail { background: var(--danger-bg); border: 1px solid var(--danger); color: var(--danger); }

  .nav-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 14px;
  }
  .btn-next {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 10px 24px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    display: none;
  }
  .btn-next:hover { background: var(--accent2); }
  .btn-next:active { transform: scale(0.97); }
  .btn-next.visible { display: block; }

  /* Results screen */
  #results-screen { display: none; }
  #results-screen.show { display: block; animation: fadeUp 0.4s ease; }
  .results-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 3rem 2rem;
    text-align: center;
    margin-bottom: 2rem;
  }
  .results-big {
    font-size: 64px;
    font-weight: 700;
    font-family: var(--mono);
    margin: 0.5rem 0;
    line-height: 1;
  }
  .results-label { font-size: 13px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2rem; }
  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    max-width: 320px;
    margin: 0 auto 2rem;
  }
  .res-stat {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    text-align: center;
  }
  .res-stat .res-val { font-family: var(--mono); font-size: 28px; font-weight: 600; margin-bottom: 4px; }
  .res-stat .res-lbl { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }
  .res-stat.ok .res-val { color: var(--success); }
  .res-stat.fail .res-val { color: var(--danger); }
  .btn-restart {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 12px 32px;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-restart:hover { background: var(--accent2); }

  #quiz-screen.hide { display: none; }
</style>
</head>
<body>

<header>
  <div class="logo">UCI & Emergencias <span>·</span> Test</div>
  <div class="counters">
    <div class="counter-pill pill-total">
      <div class="dot"></div>
      <span style="color:var(--text3);font-size:11px;">Q</span>
      <span class="val" id="cnt-total">0</span><span style="color:var(--text3)">/25</span>
    </div>
    <div class="counter-pill pill-ok">
      <div class="dot"></div>
      <span class="val" id="cnt-ok">0</span>
    </div>
    <div class="counter-pill pill-err">
      <div class="dot"></div>
      <span class="val" id="cnt-err">0</span>
    </div>
  </div>
</header>

<main>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill"></div>
  </div>

  <div id="quiz-screen">
    <div class="question-card" id="question-card">
      <div class="q-header">
        <span class="q-num" id="q-num">01 / 25</span>
        <p class="q-text" id="q-text"></p>
      </div>
      <div class="options" id="options-container"></div>
      <div class="feedback-bar" id="feedback-bar"></div>
      <div class="nav-row">
        <button class="btn-next" id="btn-next">Siguiente →</button>
      </div>
    </div>
  </div>

  <div id="results-screen">
    <div class="results-card">
      <div class="results-label">Resultado final</div>
      <div class="results-big" id="res-pct" style="color: var(--accent)">0%</div>
      <div style="color:var(--text3);font-size:13px;margin-bottom:2rem;" id="res-msg"></div>
      <div class="results-grid">
        <div class="res-stat ok">
          <div class="res-val" id="res-ok">0</div>
          <div class="res-lbl">Aciertos</div>
        </div>
        <div class="res-stat fail">
          <div class="res-val" id="res-err">0</div>
          <div class="res-lbl">Errores</div>
        </div>
      </div>
      <button class="btn-restart" onclick="restart()">Reiniciar test</button>
    </div>
  </div>
</main>

<script>
const questions = [
  {
    q: "¿Cuál de las siguientes medidas debe ser prioritaria ante un paciente en situación de edema agudo de pulmón?",
    opts: ["Cloruro mórfico", "Sedestación", "Diuréticos", "Oxigenoterapia"],
    ans: 3
  },
  {
    q: "Paciente en MI que lleva cinco días con un catéter venoso central en la cena subclavia y presenta dolor torácico agudo en el cuello que empeora con la tos, disnea, taquipnea y palpitaciones. ¿Qué patología podría ser?",
    opts: ["Insuficiencia renal", "Taponamiento cardíaco", "EPOC", "Síncope"],
    ans: 1
  },
  {
    q: "¿A qué valores de tensión arterial se da la crisis hipertensiva?",
    opts: ["> 130 mmHg de PAD", "> 130 mmHg de PAS", "130 mmHg de PAS", "130 mmHg de PAD"],
    ans: 0
  },
  {
    q: "¿Qué manifestaciones clínicas puede acompañar a una crisis hipertensiva?",
    opts: ["Alteración del nivel de conciencia", "Shock hipovolémico", "Hematuria", "Todas son correctas"],
    ans: 3
  },
  {
    q: "Cuando un paciente con TCE localiza el dolor, tiene palabras inapropiadas y abre los ojos al dolor, decimos que tiene una GCS de:",
    opts: ["10", "12", "14", "15"],
    ans: 0
  },
  {
    q: "Ante sospecha de edema agudo de pulmón, ¿qué debemos hacer para orientar el tratamiento de rescate?",
    opts: ["Tomar TA", "Saturación de O₂ para la administración correcta de O₂", "Sondaje vesical y medir la diuresis para realizar un balance hídrico", "Todas son correctas"],
    ans: 3
  },
  {
    q: "Un paciente con sospecha de edema agudo de pulmón con SatO₂ 94%, TAS 80 mmHg y glucemia 150 mg/dl. ¿Qué tratamiento está indicado?",
    opts: ["Dobutamina 5 mcg/kg/min", "Dobutamina 10 mcg/kg/min", "Captopril 25 mg", "Cloruro mórfico"],
    ans: 0
  },
  {
    q: "La diferenciación entre HDA-HDB es:",
    opts: ["Forma de presentación", "Según la hemorragia se extiende estómago o ano respectivamente", "Según se origine por encima o debajo del ángulo de Treitz", "Todas son correctas"],
    ans: 2
  },
  {
    q: "La posición de cabecero a 60º para mejorar la expansión pulmonar y disminuir la precarga es útil en:",
    opts: ["TEP", "EAP", "TC", "Todas son correctas"],
    ans: 1
  },
  {
    q: "¿Dónde se origina la mayor parte del TEP?",
    opts: ["Directamente en la aurícula derecha", "Venas pélvicas", "Sistema venoso profundo de miembros inferiores", "In situ en territorio pulmonar"],
    ans: 2
  },
  {
    q: "Para la sedación del paciente con TCE en UCI, ¿qué se debe usar prioritariamente?",
    opts: ["Diazepam", "Barbitúricos", "Midazolam", "Todos son correctos"],
    ans: 1
  },
  {
    q: "¿Qué patología está relacionada con la emergencia hipertensiva?",
    opts: ["Insuficiencia renal aguda", "Cetoacidosis metabólica", "TCE", "Ninguna"],
    ans: 0
  },
  {
    q: "¿Qué posible patología presenta un paciente con hipoperfusión tisular como resultado de un fallo en la bomba cardíaca?",
    opts: ["Shock cardiogénico", "Shock distributivo", "Shock obstructivo", "Shock hipovolémico"],
    ans: 0
  },
  {
    q: "¿Qué derivación se encuentra entre aVL y aVF?",
    opts: ["I", "II", "III", "IV"],
    ans: 2
  },
  {
    q: "El electrodo que corresponde a la derivación V4 se localiza en:",
    opts: ["Línea medioclavicular a nivel del 5.º espacio intercostal izquierdo", "Línea paraesternal a nivel del espacio intercostal izquierdo", "Línea axilar media a nivel del espacio intercostal izquierdo", "Línea medioclavicular a nivel del espacio intercostal derecho"],
    ans: 0
  },
  {
    q: "En un TCE con una TAM de 80 mmHg, ¿qué tratamiento estaría indicado?",
    opts: ["Dopamina 0,5 mcg", "Dopamina 7 mcg", "Dobutamina 7 mcg", "Todas son correctas"],
    ans: 1
  },
  {
    q: "Para aumentar la diuresis con una droga vasoactiva, ¿qué puede administrar?",
    opts: ["Dopamina hasta 0,5 microgotas", "Dopamina entre 0,5–10 microgotas", "Furosemida", "Dobutamina"],
    ans: 1
  },
  {
    q: "Ante un paciente con cetoacidosis diabética, ¿qué clínica nos podemos encontrar?",
    opts: ["Acidosis metabólica con bicarbonato < 20 mEq", "Acidosis metabólica con bicarbonato > 30 mEq", "Acidosis respiratoria con CO₂ > 45", "Alcalosis metabólica con bicarbonato < 20 mEq"],
    ans: 0
  },
  {
    q: "El Sr. Ramírez ingresa en UCI con diagnóstico de taponamiento cardíaco. Tras gasometría se obtiene acidosis metabólica. ¿Qué modificación aparecería para compensarlo?",
    opts: ["Aumenta la diuresis", "Hiperventilación", "Disminuye el GC", "Todas son correctas"],
    ans: 1
  },
  {
    q: "¿Cuál es la medida básica para tratar el taponamiento cardíaco?",
    opts: ["Toracotomía", "Oxigenoterapia", "Pericardiocentesis", "Paracentesis"],
    ans: 2
  },
  {
    q: "En cuanto a la fisiopatología de la cetoacidosis diabética, señala la afirmación correcta:",
    opts: [
      "El glicerol es el principal sustrato del proceso de cetogénesis oxidativa",
      "Existe una disminución de la filtración glomerular",
      "La lipólisis de triglicéridos da como resultado una producción de ácidos grasos libres",
      "Todas las afirmaciones anteriores son incorrectas"
    ],
    ans: 2
  },
  {
    q: "¿Qué complicación puede aparecer en una emergencia por cetoacidosis diabética?",
    opts: ["Hiperventilación", "EAP", "Shock cardiogénico", "Todas son correctas"],
    ans: 3
  },
  {
    q: "¿Qué fármaco se utiliza de 1.ª elección en el shock cardiogénico?",
    opts: [
      "Noradrenalina con el fin de disminuir el gasto cardíaco, aunque puede causar vasodilatación periférica",
      "Los diuréticos con el fin de controlar la PVC, aunque puede causar vasodilatación local",
      "Dobutamina con el fin de incrementar el GC, aunque puede causar vasodilatación periférica",
      "Dobutamina con el fin de incrementar el GC, aunque puede causar vasodilatación central"
    ],
    ans: 2
  },
  {
    q: "¿Cuáles son las manifestaciones propias del shock cardiogénico?",
    opts: ["PA alta, PVC baja", "PA alta, PVC alta", "PA baja, PVC baja", "PA baja, PVC alta"],
    ans: 3
  },
  {
    q: "En el ECG, aVF negativo y derivación I positiva podría significar:",
    opts: ["Insuficiencia cardíaca derecha", "Eje izquierdo (hemibloqueo anterior izquierdo)", "Hipertrofia ventricular derecha", "Eje normal"],
    ans: 1
  }
];

let current = 0;
let okCount = 0;
let errCount = 0;
let answered = false;
const LETTERS = ['A', 'B', 'C', 'D'];

function updateCounters() {
  document.getElementById('cnt-total').textContent = current;
  document.getElementById('cnt-ok').textContent = okCount;
  document.getElementById('cnt-err').textContent = errCount;
  const pct = questions.length > 0 ? (current / questions.length) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function loadQuestion() {
  answered = false;
  const q = questions[current];
  const n = current + 1;
  document.getElementById('q-num').textContent = String(n).padStart(2,'0') + ' / ' + questions.length;
  document.getElementById('q-text').textContent = q.q;

  const container = document.getElementById('options-container');
  container.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="opt-letter">${LETTERS[i]}</span><span class="opt-text">${opt}</span>`;
    btn.onclick = () => selectOption(i);
    container.appendChild(btn);
  });

  const fb = document.getElementById('feedback-bar');
  fb.className = 'feedback-bar';
  fb.textContent = '';

  const btnNext = document.getElementById('btn-next');
  btnNext.classList.remove('visible');
  if (current === questions.length - 1) {
    btnNext.textContent = 'Ver resultado';
  } else {
    btnNext.textContent = 'Siguiente →';
  }
  updateCounters();
}

function selectOption(selected) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const buttons = document.querySelectorAll('.option');
  buttons.forEach(btn => btn.disabled = true);

  const fb = document.getElementById('feedback-bar');
  if (selected === q.ans) {
    buttons[selected].classList.add('correct');
    fb.className = 'feedback-bar ok show';
    fb.textContent = '✓ Correcto';
    okCount++;
  } else {
    buttons[selected].classList.add('wrong');
    buttons[q.ans].classList.add('revealed');
    fb.className = 'feedback-bar fail show';
    fb.textContent = '✗ Incorrecto — la correcta es ' + LETTERS[q.ans];
    errCount++;
  }

  document.getElementById('btn-next').classList.add('visible');
  updateCounters();
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResults();
  } else {
    loadQuestion();
  }
}

function showResults() {
  document.getElementById('quiz-screen').classList.add('hide');
  const rs = document.getElementById('results-screen');
  rs.classList.add('show');

  const pct = Math.round((okCount / questions.length) * 100);
  document.getElementById('res-pct').textContent = pct + '%';
  document.getElementById('res-ok').textContent = okCount;
  document.getElementById('res-err').textContent = errCount;

  let msg = '';
  if (pct >= 80) msg = '¡Excelente dominio de UCI y emergencias!';
  else if (pct >= 60) msg = 'Buen resultado. Repasa los temas fallados.';
  else msg = 'Sigue practicando — vas a mejorar.';
  document.getElementById('res-msg').textContent = msg;

  const pctEl = document.getElementById('res-pct');
  if (pct >= 80) pctEl.style.color = 'var(--success)';
  else if (pct >= 60) pctEl.style.color = 'var(--warning)';
  else pctEl.style.color = 'var(--danger)';

  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('cnt-total').textContent = questions.length;
  document.getElementById('cnt-ok').textContent = okCount;
  document.getElementById('cnt-err').textContent = errCount;
}

function restart() {
  current = 0;
  okCount = 0;
  errCount = 0;
  answered = false;
  document.getElementById('results-screen').classList.remove('show');
  document.getElementById('quiz-screen').classList.remove('hide');
  loadQuestion();
}

document.getElementById('btn-next').addEventListener('click', nextQuestion);

loadQuestion();
</script>
</body>
</html>
